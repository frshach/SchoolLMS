# backend/src/main/resources/application.properties
server.port=${PORT:8080}

# Database - use environment variables for Render
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/schoollms}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=${JWT_SECRET:yourSecretKey12345!}
jwt.expiration=86400000

# File upload
file.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://your-frontend.vercel.app}